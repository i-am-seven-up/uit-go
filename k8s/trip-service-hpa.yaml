apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trip-service-hpa
  namespace: uit-go
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trip-service
  minReplicas: 2   # Minimum pods (TripService is orchestrator, needs at least 2 for HA)
  maxReplicas: 20  # Maximum pods (can scale aggressively under load)
  metrics:
  # Scale based on CPU usage
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70  # Scale when average CPU > 70%
  # Scale based on memory usage
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80  # Scale when average memory > 80%
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 minutes before scaling down
      policies:
      - type: Percent
        value: 50          # Scale down max 50% of current pods
        periodSeconds: 60  # Per minute
    scaleUp:
      stabilizationWindowSeconds: 0  # Scale up immediately (critical for orchestrator)
      policies:
      - type: Percent
        value: 100         # Can double pods
        periodSeconds: 15  # Every 15 seconds
      - type: Pods
        value: 5           # Or add 5 pods (more aggressive than gateway)
        periodSeconds: 15  # Every 15 seconds
      selectPolicy: Max    # Use whichever scales faster
