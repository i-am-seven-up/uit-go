apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: uit-go
  labels:
    app: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: uit-go-user-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: ConnectionStrings__Default
          value: "Host=postgres-user;Port=5432;Database=uitgo_user;Username=postgres;Password=postgres"
        - name: ConnectionStrings__Redis
          value: "uit-go-redis:6379"
        - name: Jwt__Secret
          value: "UltimateSuperSecretKeyForJwtTokenGeneration123"
        - name: RabbitMQ__HostName
          value: "rabbitmq"
        - name: RabbitMQ__Port
          value: "5672"
        - name: RabbitMQ__UserName
          value: "guest"
        - name: RabbitMQ__Password
          value: "guest"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: uit-go
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: user-service
