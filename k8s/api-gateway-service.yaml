apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: uit-go
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: api-gateway
  # Load balancing across all pods
  sessionAffinity: None
